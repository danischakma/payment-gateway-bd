<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>পেমেন্ট গেটওয়ে | Payment Gateway</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <div class="bg-animation">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <main class="container fade-in">
    <div class="glass-card main-card">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>পেমেন্ট গেটওয়ে</h1>
        <p class="subtitle">নিরাপদ ও দ্রুত পেমেন্ট সমাধান</p>
      </div>

      <div class="method-selector">
        <p class="method-label">পেমেন্ট মেথড নির্বাচন করুন</p>
        <div class="method-cards">
          <div class="method-card active" data-method="bkash" onclick="selectMethod('bkash')">
            <div class="method-logo">
              <img src="/bkash-logo.svg" alt="bKash" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
              <div class="logo-fallback bkash-fallback" style="display:none">bKash</div>
            </div>
            <span>বিকাশ</span>
          </div>
          <div class="method-card" data-method="nagad" onclick="selectMethod('nagad')">
            <div class="method-logo">
              <img src="/nagad-logo.svg" alt="Nagad" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
              <div class="logo-fallback nagad-fallback" style="display:none">Nagad</div>
            </div>
            <span>নগদ</span>
          </div>
        </div>
      </div>

      <form id="paymentForm" class="payment-form" onsubmit="initiatePayment(event)">
        <div class="input-group">
          <label for="amount">
            <i class="fa-solid fa-bangladeshi-taka-sign"></i>
            পেমেন্টের পরিমাণ (টাকা)
          </label>
          <div class="input-wrapper">
            <span class="input-prefix">৳</span>
            <input type="number" id="amount" name="amount" placeholder="0.00" min="1" step="0.01" required />
          </div>
        </div>

        <div class="input-group">
          <label for="email">
            <i class="fa-solid fa-envelope"></i>
            ইমেইল ঠিকানা
          </label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fa-solid fa-at"></i></span>
            <input type="email" id="email" name="email" placeholder="example@email.com" required />
          </div>
        </div>

        <button type="submit" class="pay-btn" id="payBtn">
          <span class="btn-content">
            <i class="fa-solid fa-lock"></i>
            পেমেন্ট করুন
          </span>
          <span class="btn-loader" style="display:none">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            প্রসেস হচ্ছে...
          </span>
        </button>
      </form>

      <div id="errorMsg" class="alert alert-error" style="display:none"></div>

      <div class="security-badges">
        <span><i class="fa-solid fa-lock"></i> SSL Secured</span>
        <span><i class="fa-solid fa-shield-halved"></i> Protected</span>
        <span><i class="fa-solid fa-circle-check"></i> Verified</span>
      </div>
    </div>

    <div class="order-lookup glass-card">
      <h3><i class="fa-solid fa-magnifying-glass"></i> অর্ডার স্ট্যাটাস চেক</h3>
      <div class="input-group">
        <div class="input-wrapper">
          <span class="input-icon"><i class="fa-solid fa-receipt"></i></span>
          <input type="text" id="lookupOrderId" placeholder="অর্ডার আইডি (ORD-XXXXXX-XXXX)" />
        </div>
      </div>
      <button class="lookup-btn" onclick="lookupOrder()">
        <i class="fa-solid fa-search"></i> স্ট্যাটাস দেখুন
      </button>
      <div id="lookupResult" class="lookup-result" style="display:none"></div>
    </div>
  </main>

  <script>
    let selectedMethod = 'bkash';

    function selectMethod(method) {
      selectedMethod = method;
      document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-method="${method}"]`).classList.add('active');
    }

    async function initiatePayment(e) {
      e.preventDefault();
      const amount = document.getElementById('amount').value;
      const email = document.getElementById('email').value;
      const btn = document.getElementById('payBtn');
      const errEl = document.getElementById('errorMsg');

      errEl.style.display = 'none';
      btn.querySelector('.btn-content').style.display = 'none';
      btn.querySelector('.btn-loader').style.display = 'flex';
      btn.disabled = true;

      try {
        const res = await fetch('/api/initiate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, email, payment_method: selectedMethod })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = `/payment?order_id=${data.order_id}`;
        } else {
          showError(data.message);
        }
      } catch (err) {
        showError('সংযোগ ব্যর্থ হয়েছে। আবার চেষ্টা করুন।');
      } finally {
        btn.querySelector('.btn-content').style.display = 'flex';
        btn.querySelector('.btn-loader').style.display = 'none';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function lookupOrder() {
      const orderId = document.getElementById('lookupOrderId').value.trim();
      const result = document.getElementById('lookupResult');
      if (!orderId) return;

      result.style.display = 'block';
      result.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> লোড হচ্ছে...';

      try {
        const res = await fetch(`/api/order-status?order_id=${orderId}`);
        const data = await res.json();

        if (data.success) {
          const o = data.order;
          const statusClass = o.status === 'completed' ? 'status-completed' : 'status-pending';
          const statusText = o.status === 'completed' ? '✅ সম্পন্ন' : '⏳ অপেক্ষামান';
          result.innerHTML = `
            <div class="lookup-detail">
              <div class="lookup-row"><span>অর্ডার আইডি:</span><strong>${o.order_id}</strong></div>
              <div class="lookup-row"><span>পরিমাণ:</span><strong>৳${parseFloat(o.amount).toFixed(2)}</strong></div>
              <div class="lookup-row"><span>মেথড:</span><strong>${o.payment_method === 'bkash' ? 'বিকাশ' : 'নগদ'}</strong></div>
              <div class="lookup-row"><span>স্ট্যাটাস:</span><strong class="${statusClass}">${statusText}</strong></div>
              ${o.trx_id ? `<div class="lookup-row"><span>TRX ID:</span><strong>${o.trx_id}</strong></div>` : ''}
            </div>`;
        } else {
          result.innerHTML = `<span class="error-text">❌ ${data.message}</span>`;
        }
      } catch {
        result.innerHTML = `<span class="error-text">❌ সংযোগ ব্যর্থ হয়েছে</span>`;
      }
    }
  </script>
  <script src="/js/main.js"></script>
</body>
</html>
